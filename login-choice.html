<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome – Refugee Management System</title>

<link rel="stylesheet" href="login.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
.portal-section{
  display:flex;
  flex-direction:row;
  justify-content:center;
  align-items:center;
  gap:18px;
  margin-top:28px;
}

.main-btn{
  width:240px;              /* increased width */
  height:62px;

  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;

  padding:0 14px;          /* inner spacing */

  background:linear-gradient(135deg,#0d6efd,#0a58ca);
  color:#fff;
  text-decoration:none;

  border-radius:14px;

  font-size:15px;          /* slightly smaller */
  font-weight:700;
  text-align:center;
  white-space:nowrap;      /* prevents awkward wrapping */

  box-shadow:0 8px 18px rgba(13,110,253,.22);
  transition:.25s ease;
}

.main-btn i{
  font-size:18px;
  flex-shrink:0;
}

.main-btn:hover{
  transform:translateY(-3px);
  background:linear-gradient(135deg,#0b5ed7,#084298);
}

@media(max-width:700px){
  .portal-section{
    flex-direction:column;
  }

  .main-btn{
    width:240px;
  }
}
</style>








</head>

<body class="login-page">

<main class="login-card">

  <div class="brand login-brand-icon">
    <i class="fa-solid fa-hand-holding-heart"></i>
  </div>

  <h1 class="main-title">Refugee Management System</h1>

  <p class="subtitle">Choose Your Portal</p>

  <p class="loading-tagline"
     id="loadingTagline"
     data-full-text="Streamlining safety, restoring dignity, smart solutions for secure lives">
  </p>

  <!-- HORIZONTAL BUTTONS -->
  <div class="portal-section">

    <a href="donation.html" class="main-btn">
      <i class="fa-solid fa-hand-holding-dollar"></i>
      Donor Portal
    </a>

    <a href="login.html" class="main-btn">
      <i class="fa-solid fa-user-shield"></i>
      System User Portal
    </a>

  </div>

</main>

<script>
const tagline = document.getElementById("loadingTagline");
const full = tagline.dataset.fullText;

let i = 0;

function typeText(){
  if(i < full.length){
    tagline.textContent += full.charAt(i);
    i++;
    setTimeout(typeText,35);
  }
}
typeText();
</script>

</body>
</html>
