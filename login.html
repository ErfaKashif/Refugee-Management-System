<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>System Login | Refugee Management System</title>

  <link rel="stylesheet" href="login.css">

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="login-page">

<main class="login-card">

  <div class="brand login-brand-icon">
    <i class="fa-solid fa-hand-holding-heart"></i>
  </div>

  <p class="subtitle">System User Login</p>

  <p class="loading-tagline"
     id="loadingTagline"
     data-full-text="Streamlining safety, restoring dignity, smart solutions for secure lives">
  </p>

  <form id="loginForm" class="form-grid">

    
<div class="input-group">
  <label for="username">Username or User ID</label>
  <input 
    type="text" 
    id="username" 
    placeholder="Enter username or numeric ID"
    required
  >
</div>

    <div class="input-group">
      <label for="password">Password</label>

      <div style="display:flex; gap:.5rem;">
        <input type="password" id="password" required>

        <button type="button" id="togglePassword">
          Show
        </button>
      </div>
    </div>

    <button type="submit">Login</button>

    <div id="loginMsg"></div>

  </form>

</main>

<script>
/* ---------------- TOGGLE PASSWORD ---------------- */
document.getElementById("togglePassword").addEventListener("click", () => {
  const p   = document.getElementById("password");
  const btn = document.getElementById("togglePassword");
  p.type    = p.type === "password" ? "text" : "password";
  btn.textContent = p.type === "password" ? "Show" : "Hide";
});

/* ---------------- TYPING EFFECT ---------------- */
const tagline = document.getElementById("loadingTagline");
const text    = tagline.dataset.fullText;
let i = 0;
(function type(){
  if(i < text.length){
    tagline.textContent += text[i++];
    setTimeout(type, 30);
  }
})();

/* ---------------- LOGIN ---------------- */
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const msg       = document.getElementById("loginMsg");
  msg.innerText   = "";
  msg.style.color = "red";

  const identifier = document.getElementById("username").value.trim();
  const password   = document.getElementById("password").value.trim();

  if (!identifier || !password) {
    msg.innerText = "Please enter your username or ID and password";
    return;
  }

  // ✅ Send 'identifier' - backend handles both username and numeric ID
  const payload = { identifier, password };

  console.log("Sending login payload:", { identifier, password: "***" });

  try {
    const res  = await fetch("/login", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify(payload)
    });

    const data = await res.json();
    console.log("Server response:", data);

    if (!res.ok) {
      msg.innerText = data.error || "Login failed";
      return;
    }

    // ✅ Store everything in localStorage
    localStorage.setItem("token",    data.token);
    localStorage.setItem("role",     data.user.role);
    localStorage.setItem("userId",   data.user.userId);
    localStorage.setItem("username", data.user.username);
    localStorage.setItem("email",    data.user.email ?? "");

    const role = data.user.role.toLowerCase();

    // Store role-specific IDs
    if (role === "coordinator") {
      localStorage.setItem("coordinatorId", data.user.coordinatorId ?? "");
      localStorage.setItem("shelterId",     data.user.shelterId     ?? "");
      localStorage.setItem("shelterName",   data.user.shelterName   ?? "");
    } else if (role === "doctor") {
      localStorage.setItem("doctorId", data.user.doctorId ?? "");
    } else if (role === "volunteer") {
      localStorage.setItem("volunteerId", data.user.volunteerId ?? "");
    }

    msg.style.color = "green";
    msg.innerText   = `Welcome, ${data.user.username}! Redirecting...`;

    // ✅ Redirect based on role
    setTimeout(() => {
      switch (role) {
        case "coordinator": window.location.href = "CoordinatorView.html"; break;
        case "admin":       window.location.href = "dashboard.html";       break;
        case "doctor":      window.location.href = "doctor.html";          break;
        case "volunteer":   window.location.href = "volunteer.html";       break;
        default:            window.location.href = "dashboard.html";
      }
    }, 800);

  } catch (err) {
    console.error("Login fetch error:", err);
    msg.innerText = "Network error - please try again";
  }
});
</script>

</body>
</html>
